<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pjay Vargas</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      line-height: 1.6;
    }

    header {
      position: fixed;
      width: 100%;
      top: 0;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      z-index: 1000;
    }

    header h2 {
      color: #22c55e;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: #22c55e;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      animation: fadeIn 2s ease-in-out;
    }

    .hero h1 {
      font-size: 50px;
    }

    .hero span {
      color: #22c55e;
    }

    .hero p {
      margin-top: 10px;
      color: #94a3b8;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #22c55e;
      color: black;
      border-radius: 5px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    section {
      padding: 80px 20px;
      text-align: center;
    }

    .card {
      background: #1e293b;
      margin: 20px auto;
      padding: 20px;
      max-width: 500px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 32px;
      }

      nav {
        display: none;
      }
    }
  </style>
</head>

<body>

<header>
  <h2>Pjay</h2>
  <nav>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<div class="hero">
  <h1>Hello, I'm <span>Pjay</span></h1>
  <p>IT Graduate | Trader | Future Marine Reservist</p>
  <a href="#contact" class="btn">Get in Touch</a>
</div>

<section id="about">
  <h2>About Me</h2>
  <div class="card">
    <p>I build tools, trade markets, and continuously improve my skills.</p>
  </div>
</section>

<section id="projects">
  <h2>Projects</h2>
  <div class="card">Trading Indicators</div>
  <div class="card">Scripts & Automation</div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <div class="card">
    <p>Email: your@email.com</p>
  </div>
</section>

</body>
</html>
